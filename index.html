<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceAuth</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Face Auth System</h1>
        
        <div class="video-container">
            <video id="video" width="640" height="480" autoplay muted></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="controls">
            <div class="status" id="statusMsg">Loading AI Models...</div>
            
            <div class="register-section">
                <input type="text" id="username" placeholder="Enter name to register">
                <button id="registerBtn" disabled>Capture & Register</button>
            </div>
            
            <button id="clearBtn" disabled>Clear All Users Database</button>
        </div>
    </div>
</body>
</html>
