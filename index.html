<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceAuth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Secure Identity System</h1>
        <p class="subtitle">Biometric data never leaves your device.</p>
        
        <div class="video-container">
            <video id="video" width="640" height="480" autoplay muted></video>
            <canvas id="overlay" width="640" height="480"></canvas>
        </div>

        <div class="controls">
            <div class="status" id="statusMsg">Connecting to camera...</div>
            
            <div class="register-section">
                <input type="text" id="username" placeholder="Enter name">
                <button id="registerBtn" disabled>Register Face</button>
            </div>
            
            <button id="clearBtn">Clear Local Database</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
